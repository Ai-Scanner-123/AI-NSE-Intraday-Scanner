<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI NSE Scanner V10.4 Auto Decision</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:white;margin:0;padding:18px}.box{max-width:760px;margin:auto;background:#111827;padding:24px;border-radius:18px;box-shadow:0 0 18px rgba(0,0,0,.45)}h1{text-align:center;color:#38bdf8;margin:0 0 8px}.sub{text-align:center;color:#dbeafe;margin-bottom:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{font-weight:bold;margin-bottom:6px;display:block;font-size:15px}input,select{width:100%;padding:13px;border:0;border-radius:10px;font-size:16px;box-sizing:border-box}button{width:100%;margin-top:18px;padding:15px;border:0;border-radius:12px;background:#22c55e;color:#052e16;font-size:20px;font-weight:bold;cursor:pointer}.result{margin-top:18px;padding:18px;border-radius:15px;background:#020617;border:1px solid #334155}.big{font-size:28px;font-weight:bold;text-align:center}.buy{color:#22c55e}.sell{color:#ef4444}.wait{color:#facc15}.row{display:flex;justify-content:space-between;border-bottom:1px solid #334155;padding:9px 0;gap:10px}.warn{margin-top:12px;color:#facc15;font-weight:bold}.small{font-size:13px;color:#cbd5e1;margin-top:12px;line-height:1.5}@media(max-width:650px){.grid{grid-template-columns:1fr}.box{padding:16px}}
</style>
</head>
<body>
<div class="box">
<h1>AI NSE Scanner V10.4</h1>
<div class="sub">Auto Confidence Score • Entry/SL/Target • Position Size • False Signal Filter</div>
<label>Stock Name</label><input id="stock" placeholder="Example: EXIDEIND">
<div class="grid">
<div><label>Current Price</label><input id="price" type="number" step="0.01" placeholder="Current Price"></div>
<div><label>Previous Close</label><input id="prev" type="number" step="0.01" placeholder="Previous Close"></div>
<div><label>Day High</label><input id="high" type="number" step="0.01" placeholder="Day High"></div>
<div><label>Day Low</label><input id="low" type="number" step="0.01" placeholder="Day Low"></div>
<div><label>RSI</label><input id="rsi" type="number" step="0.01" placeholder="RSI 0-100"></div>
<div><label>Capital Amount ₹</label><input id="capital" type="number" value="50000"></div>
</div>
<label style="margin-top:14px">Volume Strength</label>
<select id="vol"><option value="high">High RVOL</option><option value="normal">Normal Volume</option><option value="low">Low RVOL</option></select>
<label style="margin-top:14px">Market Trend</label>
<select id="trend"><option value="bullish">Market Up / Bullish</option><option value="sideways">Sideways / Neutral</option><option value="bearish">Market Down / Bearish</option></select>
<label style="margin-top:14px">Trade Side</label>
<select id="side"><option value="auto">Auto Decide</option><option value="buy">Buy Check</option><option value="sell">Sell Check</option></select>
<button onclick="scan()">SCAN NOW</button>
<div id="out" class="result" style="display:none"></div>
<div class="small">Note: यह scanner decision support के लिए है, guarantee नहीं। Intraday में capital का 1% से ज्यादा risk न लें।</div>
</div>
<script>
function n(id){return parseFloat(document.getElementById(id).value)||0}
function scan(){
 let stock=document.getElementById('stock').value||'STOCK';
 let price=n('price'),prev=n('prev'),high=n('high'),low=n('low'),rsi=n('rsi'),capital=n('capital');
 let vol=document.getElementById('vol').value,trend=document.getElementById('trend').value,side=document.getElementById('side').value;
 if(!price||!prev||!high||!low||!rsi||!capital){alert('कृपया सभी values भरें');return}
 let chg=((price-prev)/prev)*100, range=high-low, pos=(price-low)/range*100;
 let buy=0,sell=0,notes=[];
 if(chg>0)buy+=18; else sell+=18;
 if(price>prev)buy+=12; else sell+=12;
 if(pos>60)buy+=12; if(pos<40)sell+=12;
 if(rsi>=45&&rsi<=68)buy+=18; if(rsi>=32&&rsi<=55)sell+=18;
 if(rsi>72){buy-=18;notes.push('RSI ज्यादा है: Buy chase न करें');}
 if(rsi<28){sell-=18;notes.push('RSI बहुत कम है: Sell chase न करें');}
 if(vol==='high'){buy+=14;sell+=14}else if(vol==='normal'){buy+=6;sell+=6}else{buy-=18;sell-=18;notes.push('Low RVOL: Signal weak है');}
 if(trend==='bullish'){buy+=16;sell-=12}else if(trend==='bearish'){sell+=16;buy-=12}else{buy+=4;sell+=4}
 let finalSide=side==='auto'?(buy>=sell?'BUY':'SELL'):(side==='buy'?'BUY':'SELL');
 let conf=Math.max(0,Math.min(100, finalSide==='BUY'?buy:sell));
 let signal='WAIT / AVOID', cls='wait';
 if(conf>=75){signal=finalSide+' - STRONG'; cls=finalSide==='BUY'?'buy':'sell'}
 else if(conf>=60){signal=finalSide+' - MODERATE'; cls=finalSide==='BUY'?'buy':'sell'}
 if(finalSide==='BUY'&&trend==='bearish'&&conf<75){signal='WAIT / AVOID';cls='wait';notes.push('Market bearish है, Buy avoid बेहतर है');}
 if(finalSide==='SELL'&&trend==='bullish'&&conf<75){signal='WAIT / AVOID';cls='wait';notes.push('Market bullish है, Sell avoid बेहतर है');}
 let entry=price, sl, target1, target2;
 if(finalSide==='BUY'){sl=Math.max(low, price-(range*.35)); target1=price+(price-sl)*1.5; target2=price+(price-sl)*2;}
 else{sl=Math.min(high, price+(range*.35)); target1=price-(sl-price)*1.5; target2=price-(sl-price)*2;}
 let riskPerShare=Math.abs(entry-sl), maxRisk=capital*.01, qty=Math.floor(maxRisk/riskPerShare);
 if(qty<1){qty=0;notes.push('Risk high है: Quantity 0 या very small रखें');}
 let quality=conf>=80?'Excellent':conf>=70?'Good':conf>=60?'Average':'Avoid';
 document.getElementById('out').style.display='block';
 document.getElementById('out').innerHTML=`
 <div class="big ${cls}">${signal}</div>
 <div class="row"><b>Stock</b><span>${stock}</span></div>
 <div class="row"><b>Confidence Score</b><span>${conf.toFixed(0)}%</span></div>
 <div class="row"><b>Trade Quality</b><span>${quality}</span></div>
 <div class="row"><b>Entry</b><span>₹${entry.toFixed(2)}</span></div>
 <div class="row"><b>Stop Loss</b><span>₹${sl.toFixed(2)}</span></div>
 <div class="row"><b>Target 1</b><span>₹${target1.toFixed(2)}</span></div>
 <div class="row"><b>Target 2</b><span>₹${target2.toFixed(2)}</span></div>
 <div class="row"><b>Risk/Reward</b><span>1 : 1.5 / 1 : 2</span></div>
 <div class="row"><b>Safe Quantity</b><span>${qty} shares</span></div>
 <div class="row"><b>Max Risk</b><span>₹${maxRisk.toFixed(0)} approx</span></div>
 <div class="row"><b>Price Change</b><span>${chg.toFixed(2)}%</span></div>
 ${notes.length?'<div class="warn">⚠️ '+notes.join('<br>⚠️ ')+'</div>':''}
 `;
}
</script>
</body>
</html>
