<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI NSE Scanner V11 PRO Decision Quality</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:white;margin:0;padding:18px}.box{max-width:820px;margin:auto;background:#111827;padding:24px;border-radius:18px;box-shadow:0 0 18px rgba(0,0,0,.45)}h1{text-align:center;color:#38bdf8;margin:0 0 8px}.sub{text-align:center;color:#dbeafe;margin-bottom:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{font-weight:bold;margin-bottom:6px;display:block;font-size:15px}input,select{width:100%;padding:13px;border:0;border-radius:10px;font-size:16px;box-sizing:border-box}button{width:100%;margin-top:18px;padding:15px;border:0;border-radius:12px;background:#22c55e;color:#052e16;font-size:20px;font-weight:bold;cursor:pointer}.result{margin-top:18px;padding:18px;border-radius:15px;background:#020617;border:1px solid #334155}.big{font-size:30px;font-weight:bold;text-align:center}.buy{color:#22c55e}.sell{color:#ef4444}.wait{color:#facc15}.row{display:flex;justify-content:space-between;border-bottom:1px solid #334155;padding:9px 0;gap:10px}.tag{display:inline-block;padding:5px 10px;border-radius:999px;background:#1e293b;margin:3px}.warn{margin-top:12px;color:#facc15;font-weight:bold}.bad{color:#fb7185}.good{color:#86efac}.small{font-size:13px;color:#cbd5e1;margin-top:12px;line-height:1.5}.reason{line-height:1.7;margin-top:12px}.pill{font-weight:bold;padding:4px 8px;border-radius:8px;background:#172554;color:#bfdbfe}@media(max-width:650px){.grid{grid-template-columns:1fr}.box{padding:16px}.row{display:block}}
</style>
</head>
<body>
<div class="box">
<h1>AI NSE Scanner V11 PRO</h1>
<div class="sub">Decision Quality Engine • Grade • Fake Breakout Filter • Entry/SL/Targets</div>
<label>Stock Name</label><input id="stock" placeholder="Example: EXIDEIND">
<div class="grid">
<div><label>Current Price</label><input id="price" type="number" step="0.01" placeholder="Current Price"></div>
<div><label>Previous Close</label><input id="prev" type="number" step="0.01" placeholder="Previous Close"></div>
<div><label>Day High</label><input id="high" type="number" step="0.01" placeholder="Day High"></div>
<div><label>Day Low</label><input id="low" type="number" step="0.01" placeholder="Day Low"></div>
<div><label>RSI</label><input id="rsi" type="number" step="0.01" placeholder="RSI 0-100"></div>
<div><label>Capital Amount ₹</label><input id="capital" type="number" value="50000"></div>
</div>
<label style="margin-top:14px">Volume Strength</label>
<select id="vol"><option value="high">High RVOL</option><option value="normal">Normal Volume</option><option value="low">Low RVOL</option></select>
<label style="margin-top:14px">Market Trend</label>
<select id="trend"><option value="bullish">Market Up / Bullish</option><option value="sideways">Sideways / Neutral</option><option value="bearish">Market Down / Bearish</option></select>
<label style="margin-top:14px">Trade Side</label>
<select id="side"><option value="auto">Auto Decide</option><option value="buy">Buy Check</option><option value="sell">Sell Check</option></select>
<button onclick="scan()">SCAN NOW</button>
<div id="out" class="result" style="display:none"></div>
<div class="small">Note: यह scanner intraday decision support के लिए है, profit guarantee नहीं। Capital का 1% से ज्यादा risk न लें। News/event वाले stocks में extra सावधानी रखें।</div>
</div>
<script>
function n(id){return parseFloat(document.getElementById(id).value)||0}
function money(x){return '₹'+Number(x).toFixed(2)}
function clamp(x,min,max){return Math.max(min,Math.min(max,x))}
function scan(){
 let stock=document.getElementById('stock').value||'STOCK';
 let price=n('price'),prev=n('prev'),high=n('high'),low=n('low'),rsi=n('rsi'),capital=n('capital');
 let vol=document.getElementById('vol').value,trend=document.getElementById('trend').value,side=document.getElementById('side').value;
 if(!price||!prev||!high||!low||!rsi||!capital||high<=low){alert('कृपया सभी values सही भरें');return}
 let range=high-low, change=((price-prev)/prev)*100, pos=((price-low)/range)*100;
 let buyScore=50, sellScore=50, reasons=[], warnings=[];
 // Price position logic
 if(pos>=70){buyScore+=15;sellScore-=8;reasons.push('✔ Price day high के पास है: bullish momentum');}
 else if(pos<=30){sellScore+=15;buyScore-=8;reasons.push('✔ Price day low के पास है: bearish pressure');}
 else{buyScore+=3;sellScore+=3;reasons.push('➜ Price mid-range में है: confirmation जरूरी');}
 // Change logic
 if(change>0.3){buyScore+=10;sellScore-=5;reasons.push('✔ Stock previous close से ऊपर है');}
 if(change<-0.3){sellScore+=10;buyScore-=5;reasons.push('✔ Stock previous close से नीचे है');}
 if(Math.abs(change)>3){warnings.push('⚠ Big move already हो चुका है: chase न करें');buyScore-=8;sellScore-=8;}
 // RSI logic
 if(rsi>=45&&rsi<=62){buyScore+=12;reasons.push('✔ RSI healthy buy zone में है');}
 if(rsi>=38&&rsi<=55){sellScore+=8;}
 if(rsi>72){warnings.push('⚠ RSI overbought: fresh buy risky');buyScore-=18;sellScore+=8;}
 if(rsi<28){warnings.push('⚠ RSI oversold: fresh sell risky');sellScore-=18;buyScore+=8;}
 if(rsi>62&&rsi<=72){buyScore+=4;warnings.push('⚠ RSI high है: only pullback/support पर entry बेहतर');}
 if(rsi>=28&&rsi<38){sellScore+=4;warnings.push('⚠ RSI low है: breakdown confirmation जरूरी');}
 // Volume
 if(vol==='high'){buyScore+=12;sellScore+=12;reasons.push('✔ High RVOL: move में strength है');}
 if(vol==='normal'){buyScore+=4;sellScore+=4;reasons.push('➜ Normal volume: average confidence');}
 if(vol==='low'){buyScore-=18;sellScore-=18;warnings.push('⚠ Low RVOL: false signal का risk ज्यादा');}
 // Market trend
 if(trend==='bullish'){buyScore+=14;sellScore-=12;reasons.push('✔ Market bullish है: buy side support');}
 if(trend==='bearish'){sellScore+=14;buyScore-=12;reasons.push('✔ Market bearish है: sell side support');}
 if(trend==='sideways'){buyScore-=4;sellScore-=4;warnings.push('⚠ Sideways market: target छोटा रखें');}
 // Fake breakout filters
 let nearHigh=((high-price)/price)*100, nearLow=((price-low)/price)*100;
 if(nearHigh<0.20 && vol!=='high'){warnings.push('⚠ High के पास breakout है लेकिन RVOL strong नहीं: fake breakout risk');buyScore-=12;}
 if(nearLow<0.20 && vol!=='high'){warnings.push('⚠ Low के पास breakdown है लेकिन RVOL strong नहीं: fake breakdown risk');sellScore-=12;}
 // Decide side
 let finalSide=side;
 if(side==='auto') finalSide=buyScore>=sellScore?'buy':'sell';
 let conf=finalSide==='buy'?buyScore:sellScore;
 conf=clamp(Math.round(conf),0,100);
 let signal='WAIT / AVOID', cls='wait';
 if(finalSide==='buy'&&conf>=80){signal='STRONG BUY';cls='buy'}
 else if(finalSide==='buy'&&conf>=65){signal='BUY';cls='buy'}
 else if(finalSide==='sell'&&conf>=80){signal='STRONG SELL';cls='sell'}
 else if(finalSide==='sell'&&conf>=65){signal='SELL';cls='sell'}
 let grade=conf>=88?'A+':conf>=80?'A':conf>=70?'B+':conf>=60?'B':conf>=50?'C':'AVOID';
 let slDist=Math.max(range*0.28, price*0.004);
 let entry=price, sl,t1,t2,t3;
 if(finalSide==='buy'){sl=price-slDist;t1=price+slDist*1.5;t2=price+slDist*2.2;t3=price+slDist*3;}
 else{sl=price+slDist;t1=price-slDist*1.5;t2=price-slDist*2.2;t3=price-slDist*3;}
 let riskPerShare=Math.abs(entry-sl), riskAmt=capital*0.01, qty=Math.floor(riskAmt/riskPerShare);
 let rr1=(Math.abs(t1-entry)/riskPerShare).toFixed(1), rr2=(Math.abs(t2-entry)/riskPerShare).toFixed(1), rr3=(Math.abs(t3-entry)/riskPerShare).toFixed(1);
 if(signal==='WAIT / AVOID'){warnings.push('⚠ Confidence कम है: trade skip करना बेहतर');}
 document.getElementById('out').style.display='block';
 document.getElementById('out').innerHTML=`
 <div class="big ${cls}">${signal}</div>
 <div style="text-align:center;margin:8px 0"><span class="pill">Confidence ${conf}%</span> <span class="pill">Grade ${grade}</span></div>
 <div class="row"><b>Stock</b><span>${stock}</span></div>
 <div class="row"><b>Entry</b><span>${money(entry)}</span></div>
 <div class="row"><b>Stop Loss</b><span>${money(sl)}</span></div>
 <div class="row"><b>Target 1</b><span>${money(t1)} | RR 1:${rr1}</span></div>
 <div class="row"><b>Target 2</b><span>${money(t2)} | RR 1:${rr2}</span></div>
 <div class="row"><b>Target 3</b><span>${money(t3)} | RR 1:${rr3}</span></div>
 <div class="row"><b>Position Size</b><span>${qty>0?qty:0} Shares</span></div>
 <div class="row"><b>Max Risk</b><span>${money(riskAmt)} approx.</span></div>
 <div class="row"><b>Day Position</b><span>${pos.toFixed(1)}% of range</span></div>
 <div class="row"><b>Change vs Prev Close</b><span>${change.toFixed(2)}%</span></div>
 <div class="reason">${reasons.map(x=>'<div class="good">'+x+'</div>').join('')}</div>
 <div class="warn">${warnings.map(x=>'<div>'+x+'</div>').join('')}</div>
 <div class="small">Rule: Grade A/A+ और Confidence 80%+ पर ही strong trade मानें। Entry लेने से पहले candle confirmation और market direction जरूर देखें।</div>`;
}
</script>
</body>
</html>
